{% extends 'base.html' %}
{% block title %}Password Reset Complete — ShopSphere{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="position:relative;z-index:1;">
  <div class="auth-card animate-in text-center">
    <div style="font-size:4rem;margin-bottom:1rem;">✅</div>
    <div class="auth-logo">ShopSphere</div>
    <h1 class="auth-title">Password Changed!</h1>
    <p class="auth-subtitle">Your password has been successfully reset. You can now sign in with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="btn-primary-glow justify-content-center">
      <i class="bi bi-box-arrow-in-right"></i> Sign In Now
    </a>
  </div>
</div>
{% endblock %}
