{% extends 'base.html' %}
{% block title %}Reset Password — ShopSphere{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="position:relative;z-index:1;">
  <div class="auth-card animate-in">
    <div class="auth-logo">ShopSphere</div>
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Enter your email and we'll send reset instructions</p>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control form-control-lg" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn-primary-glow w-100 justify-content-center">
        <i class="bi bi-envelope"></i> Send Reset Link
      </button>
    </form>
    <div class="text-center mt-4" style="font-size:.875rem;color:var(--text-muted);">
      Remember your password? <a href="{% url 'accounts:login' %}" style="color:var(--primary-light);font-weight:600;">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
