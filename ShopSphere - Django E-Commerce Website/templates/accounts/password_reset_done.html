{% extends 'base.html' %}
{% block title %}Email Sent — ShopSphere{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="position:relative;z-index:1;">
  <div class="auth-card animate-in text-center">
    <div style="font-size:4rem;margin-bottom:1rem;">📧</div>
    <div class="auth-logo">ShopSphere</div>
    <h1 class="auth-title">Check Your Email</h1>
    <p class="auth-subtitle">We've sent password reset instructions to your email address. Check your inbox (and spam folder).</p>
    <a href="{% url 'accounts:login' %}" class="btn-primary-glow justify-content-center">
      <i class="bi bi-arrow-left"></i> Back to Sign In
    </a>
  </div>
</div>
{% endblock %}
